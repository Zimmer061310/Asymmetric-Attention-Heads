experiment:
  name: "aah-small-wt2-h2w256s2"
  seed: 1337
  variant: "aah_h2w256s2"
  out_dir: "experiments"
data:
  dataset: "wikitext-2-raw-v1"
  tokenizer: "gpt2"
  seq_len: 512
  num_workers: 2
model:
  n_layer: 8
  n_head: 8
  n_embd: 512
  n_ff: 2048
  dropout: 0.1
  aah_enabled: true
  aah_local_heads: 2   # H_local = H/4
  aah_window: 256      # W
  aah_stride: 2        # s
train:
  batch_size: 8
  grad_accum: 1
  max_steps: 2000
  lr: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 100
  eval_interval: 200
  eval_batches: 50
  log_interval: 50
  device: "auto"
  use_wandb: true
  log_csv: true
