experiment:
  name: "baseline-200m-32k-wt2"
  seed: 1337
  variant: "baseline"
  out_dir: "experiments"
data:
  dataset: "wikitext-2-raw-v1"
  tokenizer: "gpt2"
  seq_len: 512
  num_workers: 2
model:
  n_layer: 16
  n_head: 16
  n_embd: 1024
  n_ff: 4096
  dropout: 0.1
train:
  batch_size: 8
  grad_accum: 1
  max_steps: 32000
  lr: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 100
  eval_interval: 500
  eval_batches: 50
  eval_log_progress: true
  log_interval: 50
  device: "cuda"
  precision: "bf16"
  use_wandb: true
  log_csv: true
