experiment:
  name: backend-4096-dense-memory-sanity-seed0
  seed: 0
  variant: backend_4096_dense_memory_sanity
  out_dir: experiments/backend_realized_local_attention/DenseMasked/memory_sanity/results
data:
  dataset: wikitext-2-raw-v1
  tokenizer: gpt2
  seq_len: 4096
  num_workers: 2
model:
  n_layer: 16
  n_head: 12
  n_embd: 1536
  n_ff: 6144
  dropout: 0.0
  attention_backend: dense_masked
  flex_block_size: 128
train:
  batch_size: 1
  grad_accum: 1
  max_steps: 10000
  lr: 0.0003
  weight_decay: 0.1
  warmup_steps: 100
  eval_interval: 200
  eval_batches: 20
  eval_log_progress: false
  log_interval: 50
  device: cuda
  precision: bf16
  use_wandb: true
  log_csv: true
  save_checkpoints: true
  checkpoint_steps:
  - 1000
  - 5000
  - 10000
profiling:
  memory_sanity_only: true
  notes: Dense-masked full-attention control run after backend reruns. Use gpu_alloc_max_mb and gpu_reserved_max_mb to check whether dense memory accounting differs across servers.
