runs:
  - id: pure_flash_full_attention
    backend: flash_attention
    aah_enabled: false
    attention_pattern: full_causal
    context_length: 4096
    candidate_windows: null
    role: baseline_denominator
    notes: "Pure FlashAttention full causal baseline with no AAH modules."

metrics:
  - val_loss
  - val_ppl
  - gpu_flops_attention_ncu
  - gpu_flops_attention_ratio_ncu
  - gpu_flops_total_ncu
  - gpu_flops_total_ratio_ncu
  - tokens_per_second
  - peak_gpu_memory
  - backend_time_ms
  - backend_fallback_rate
