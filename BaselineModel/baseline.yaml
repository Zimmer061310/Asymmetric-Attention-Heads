experiment:
  name: "baseline-wt2"
  seed: 1337
  variant: "baseline"
  out_dir: "experiments"
data:
  dataset: "wikitext-2-raw-v1"
  tokenizer: "gpt2"
  seq_len: 512
  num_workers: 2
model:
  n_layer: 8
  n_head: 8
  n_embd: 512
  n_ff: 2048
  dropout: 0.1
  aah_v2_enabled: false
  aah_v3_enabled: false
train:
  batch_size: 8
  grad_accum: 1
  max_steps: 10000
  lr: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 100
  eval_interval: 200
  eval_batches: 50
  eval_log_progress: true
  log_interval: 50
  device: "mps"
  use_wandb: true
  log_csv: true
